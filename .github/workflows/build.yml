name: Android APK Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Repoyu çek
        uses: actions/checkout@v4

      - name: 2. Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Java (JDK 17) kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 4. Capacitor projesi için gerekli dosyaları oluştur
        run: |
          mkdir -p www
          if [ -f "index.html" ]; then
            mv index.html www/index.html
          fi

          cat > package.json << 'EOF'
          {
            "name": "turkiye-daglari-oyun",
            "version": "1.0.0",
            "description": "Turkiye Daglari Oyunu",
            "dependencies": {
              "@capacitor/android": "^6.1.0",
              "@capacitor/core": "^6.1.0"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.1.0"
            }
          }
          EOF

          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.dieapps.turkiyedaglari",
            "appName": "Turkiye Daglari",
            "webDir": "www",
            "bundledWebRuntime": false,
            "android": {
              "allowMixedContent": true
            }
          }
          EOF

      - name: 5. npm bağımlılıklarını yükle
        run: npm install

      - name: 6. Android platformunu ekle (yoksa)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: 7. Web içeriğini Android projesine senkronize et
        run: npx cap sync android

      - name: 8. Gradle ile APK derle (debug)
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: 9. APK dosyasını yapı çıktısı (artifact) olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: turkiye-daglari-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: 10. APK adını yeniden adlandır
        run: cp android/app/build/outputs/apk/debug/app-debug.apk turkiye-daglari.apk

      - name: 11. GitHub Release oluştur ve APK'yı ekle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Türkiye Dağları v${{ github.run_number }}"
          files: turkiye-daglari.apk
          body: "Otomatik build. Commit: ${{ github.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
