name: Android APK Build

# Bu workflow main branch'e her push'ta veya elle tetiklendiğinde çalışır
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Repoyu çek
        uses: actions/checkout@v4

      - name: 2. Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Java (JDK 17) kur
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 4. npm bağımlılıklarını yükle
        run: npm install

      - name: 5. Android platformunu ekle (yoksa)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: 6. Web içeriğini Android projesine senkronize et
        run: npx cap sync android

      - name: 7. Gradle ile APK derle (debug)
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: 8. APK dosyasını yapı çıktısı (artifact) olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: turkiye-daglari-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
